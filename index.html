<!DOCTYPE html>
<html lang = "de">
<head>
    <meta charset="UTF-8">
    <title>Kniffel Scorecard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>My fantastic Kniffel Scorecard</h1>
        <div class="header-actions">
            <button id="addPlayerBtn">Add Spieler</button>
            <button id="endGame">Ende Spiel</button>
            <button id="startGame">Starte Spiel</button>
        </div>
    </header>

    <main>
        <div id="scorecardContainer">
            <table id="scorecard">
                <thead id="playerHeader"></thead>
                <tbody id="scorecardBody"></tbody>
            </table>
        </div>
    </main>
    
    <div id="scorePicker" class="hidden"></div>
    <div id="gameOverOverlay" class="hidden">
        <h1>Game Over</h1>
        <h2> Final ranking</h2>
        <div id="rankingList"></div>
        <button id="gameOverBtn"></button>
    </div>
    
    <script src="js/state.js"></script>
    <script src="js/scoring.js"></script>
    <script src="js/ui.js"></script>
    
</body>
